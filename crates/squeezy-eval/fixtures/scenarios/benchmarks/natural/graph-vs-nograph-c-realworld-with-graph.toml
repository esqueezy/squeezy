id = "graph-vs-nograph-c-realworld-with-graph"
title = "nginx HTTP request phase-entry caller graph — with graph (openai mini)"
description = """
Real-world C audit A/B. Enumerate the production C call-graph edges
that connect every direct caller of `ngx_http_process_request` to
nginx's HTTP phase engine entrypoint `ngx_http_core_run_phases`.
The graph half can combine upstream and downstream flow around
`ngx_http_process_request`; the no-graph half has to find and read
the relevant C definitions manually.
"""

[workspace.github]
repo = "nginx/nginx"
sha = "d44205284fa41662da803b796d6056fc1e59b1f3"

[squeezy]
provider = "openai"
model = "gpt-5.4-mini"
mode = "build"
permission_mode = "allow"
tool_choice = "auto"
instructions = """
You are Squeezy, a cost-aware coding agent. Answer code questions
concisely using whatever tools are available to you. Cite file paths
and 1-based line numbers when relevant. Do not invent symbols. Stop
once you have enough evidence to answer the question, and answer in
the exact requested format.
"""
max_tool_calls_per_turn = 64

[[steps]]
kind = "prompt"
text = """
This audit is C only. Restrict every lookup to nginx C sources
(`*.c`/`*.h`); ignore any file with a C++ extension
(`.cpp`/`.hpp`/`.cc`/`.cxx`/`.h++`) — nginx has none in this tree, so
seeing one means you wandered into the wrong place.

Find every distinct production C call-graph edge needed to connect
all direct callers of `ngx_http_process_request` to nginx's HTTP phase
engine entrypoint `ngx_http_core_run_phases`.

Output exactly six tab-separated rows, no header and no prose:

    <caller>	<callee>	<repo-relative-path>:<line>

Rules:
- Use the concrete call sites in production C source, not declarations.
- Include every direct caller of `ngx_http_process_request` under
  `src/http/`, including HTTP/1.x, HTTP/2, and HTTP/3 paths.
- Include the shared suffix edge where `ngx_http_process_request`
  calls `ngx_http_handler`.
- Include the shared suffix edge where `ngx_http_handler` calls
  `ngx_http_core_run_phases`.
- Do not include error-response or upstream finalization paths.
- Sort rows by caller name ascending, except put the two shared suffix
  edges last in execution order.
"""

[expect]
max_wall_clock_seconds = 600
max_input_tokens = 200000

[triage]
enabled = false
