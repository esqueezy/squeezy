id = "audit-inline-attach-visible-token-tui"
title = "Audit - inline /attach inserts a visible prompt token"
description = """
Drive the TUI path for text before and after `/attach Cargo.toml`. The command
should replace the inline command segment with a visible `[Attached file
Cargo.toml]` token while preserving the surrounding composer text.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 32
palette_tone = "dark"

[[steps]]
kind = "action"
action = "send_keys"
keys = [
  "r",
  "e",
  "v",
  "i",
  "e",
  "w",
  "space",
  "/",
  "a",
  "t",
  "t",
  "a",
  "c",
  "h",
  "space",
  "C",
  "a",
  "r",
  "g",
  "o",
  ".",
  "t",
  "o",
  "m",
  "l",
  "space",
  "p",
  "l",
  "e",
  "a",
  "s",
  "e",
  "Enter",
]

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "inserted [Attached file Cargo.toml]"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "review [Attached file Cargo.toml]"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "please"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback - no model turn expected)"

[triage]
enabled = false
