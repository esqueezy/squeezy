id = "audit-config-verbosity-bare"
title = "Audit · /verbosity (no arg) opens config_screen on Verbosity section"
description = """
Bare `/verbosity` falls through to toggle_config_screen with the
Verbosity SectionId. modal_active = "config" (NOT the legacy
verbosity-only overlay), and the Verbosity label appears in the frame.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/verbosity"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "modal_active"
name = "config"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "Verbosity"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
