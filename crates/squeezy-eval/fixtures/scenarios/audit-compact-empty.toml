id = "audit-compact-empty"
title = "Audit · /compact on an empty conversation"
description = """
`/compact` with no prior turns. The agent's `compact_context_manual`
runs against an empty conversation; the dispatch path returns
`DispatchOutcome::Compacted` on success and
`DispatchOutcome::Error { command: "/compact", … }` if the
"not enough context" guard fires. This scenario pins which branch
fires when the conversation is empty — surfacing whether the UX
swallows the "nothing to compact" case gracefully or returns an
error string.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/compact"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
