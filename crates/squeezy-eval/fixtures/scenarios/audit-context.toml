id = "audit-context"
title = "Audit · /context emits ContextSnapshot"
description = """
Bare `/context` dispatch — same payload shape as `/cost` (both read
`session_accounting_snapshot`) but a distinct outcome variant
`DispatchOutcome::ContextSnapshot`. Driver renders as
`context_snapshot`. The duplication between /cost and /context is a
candidate redundancy finding.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/context"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
