id = "audit-misc-diff-with-changes"
title = "Audit · /diff renders the worktree diff card"
description = """
Runs against the live workspace. `handle_slash_diff` spawns a
blocking diff task; `pump_until_idle` now waits for
`app.pending_diff` to drain (squeezy-nyg8.2) so the assert reads the
landed transcript entry without a follow-up slash.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 44
palette_tone = "dark"

[[steps]]
kind = "action"
action = "slash_command"
command = "/diff"

# A successful diff card writes a `diff` transcript entry kind via
# `app.push_diff_card`. The empty-tree path pushes a system log line
# instead. Asserting on the transcript-entry kind is robust to scroll
# state because it reads the typed entry, not the rendered frame.
[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_transcript_entry"
entry_kind = "diff"
[steps.check.index]
by = "last_of_kind"
entry_kind = "diff"

[expect]
max_wall_clock_seconds = 60
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected)"

[triage]
enabled = false
