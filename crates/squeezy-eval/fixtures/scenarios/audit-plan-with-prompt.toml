id = "audit-plan-with-prompt"
title = "Audit · /plan <prompt> switches mode (prompt is TUI-side, ignored agent-side)"
description = """
`/plan` accepts an optional trailing prompt that, in the TUI, is fed
into a turn. The agent-side `DispatchCommand::Plan { prompt }` handler
only switches mode — the prompt is discarded. This scenario exists to
flag that documented divergence: `mode_plan_changed=true` fires, but
the trailing text never reaches the model. Run via `drive_tui = false`
to pin the agent-side behavior.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = false

[[steps]]
kind = "action"
action = "slash_command"
command = "/plan summarize the repo structure"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback — no model turn expected agent-side)"

[triage]
enabled = false
