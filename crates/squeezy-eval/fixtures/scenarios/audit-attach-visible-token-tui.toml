id = "audit-attach-visible-token-tui"
title = "Audit · /attach inserts a visible prompt token"
description = """
Drive the TUI path for `/attach Cargo.toml`. The command should leave a
visible `[Attached file Cargo.toml]` token in the composer instead of
creating hidden attached context.
"""

[workspace]
local = "."

[squeezy]
provider = "mock"
mode = "build"
permission_mode = "ask"

[tui_capture]
enabled = true
drive_tui = true
width = 140
height = 32
palette_tone = "dark"

[[steps]]
kind = "action"
action = "send_keys"
keys = [
  "/",
  "a",
  "t",
  "t",
  "a",
  "c",
  "h",
  "space",
  "C",
  "a",
  "r",
  "g",
  "o",
  ".",
  "t",
  "o",
  "m",
  "l",
  "Enter",
]

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_status_contains"
text = "inserted [Attached file Cargo.toml]"

[[steps]]
kind = "action"
action = "assert"
[steps.check]
kind = "tui_frame_contains"
text = "[Attached file Cargo.toml]"

[expect]
max_wall_clock_seconds = 30
max_tools_per_turn = 0
no_tool_errors = true

[mock]
default_text = "(mock fallback - no model turn expected)"

[triage]
enabled = false
